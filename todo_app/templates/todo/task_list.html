<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
</head>
<body>
    <h1>My To-Do List</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Enter a task">
        <button type="submit">Add Task</button>
    </form>

    {% if tasks %}
        <ul>
            {% for task in tasks %}
                <li>
                    {{ task.title }}
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No tasks available.</p>
    {% endif %}
</body>
</html>
