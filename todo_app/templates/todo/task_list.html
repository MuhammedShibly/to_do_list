<!DOCTYPE html>
<html>
<head>
    <title>To-Do List</title>
</head>
<body>
    <h1>My To-Do List</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="title" placeholder="Enter a task">
        <button type="submit">Add Task</button>
    </form>

    {% if tasks %}
        <ul>
            {% for task in tasks %}
            <li>
                {% if task.completed %}
                <s>{{ task.title }}</s>
                {% else %}
                {{ task.title }}
                {% endif %}
                <a href="{% url 'toggle_complete' task.id %}">
                    {% if task.completed %}
                    Undo
                    {% else %}
                    Complete
                    {% endif %}
                </a>
                <a href="{% url 'delete_task' task.id %}">Delete</a>
            </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No tasks available.</p>
    {% endif %}
</body>
</html>
